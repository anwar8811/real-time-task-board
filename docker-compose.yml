services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard
      POSTGRES_DB: taskboard
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard -d taskboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://taskboard:taskboard@db:5432/taskboard
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"

volumes:
  pg_data:
